\* TLC / Apalache configuration for commit_protocol.tla  (SAFETY check)
\*
\* Bounded model: 2 writers, 2 readers, manifest versions 0..2 (so up to two
\* concurrent commit epochs over the genesis snapshot), lease epochs 0..3
\* (enough for the zombie-takeover interleaving: W1 acquires (epoch 1), stalls,
\* lease expires, W2 acquires (epoch 2), commits, W1 wakes and is fenced).
\* MaxLeaseEpoch also bounds the per-writer ATTEMPT counter (each retry stages
\* a fresh, attempt-scoped object id; DA-1 refinement, BUG-0012 / T-0046).
\*
\* This is the SPIKE-0002 suggested bound (<=2 readers, <=2 writer epochs,
\* <=2 GC cycles). Small enough for TLC exhaustive search and Apalache BMC.

CONSTANTS
    Writers = { w1, w2 }
    Readers = { r1, r2 }
    MaxVersion = 2
    MaxLeaseEpoch = 3
    None = NoneVal          \* a distinct, unspecified TLC model value

INIT Init
NEXT Next

\* Safety: a single conjoined invariant plus each named property so a
\* violation reports the exact invariant that broke.
INVARIANT SafetyInvariant
INVARIANT TypeOK
INVARIANT NoTornCommit
INVARIANT SnapshotIsolation
INVARIANT AtMostOneCommitPerVersion
INVARIANT ManifestImmutable
INVARIANT GCSafety
INVARIANT OrphansNeverReferenced
INVARIANT NoOverwriteOfReferenced
INVARIANT LatestIsDurable

\* Permutation symmetry over interchangeable READER ids only (safety only).
\* Writers are NOT permuted: after the DA-1 refinement a staged object's id
\* embeds the writer, so the object-layer invariants (OrphansNeverReferenced,
\* NoOverwriteOfReferenced) distinguish writers and writer-symmetry would be
\* unsound. Readers carry no such payload.
SYMMETRY Symmetry
