\* TLC configuration for commit_protocol.tla  (LIVENESS check)
\*
\* Same bound as the safety config, but uses the fair Spec and checks the
\* temporal property. No SYMMETRY (symmetry is unsound for liveness in TLC).

CONSTANTS
    Writers = { w1, w2 }
    Readers = { r1, r2 }
    MaxVersion = 2
    MaxLeaseEpoch = 3
    None = NoneVal

SPECIFICATION Spec

PROPERTY LivenessProperty
