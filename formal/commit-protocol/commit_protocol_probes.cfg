\* TLC configuration for commit_protocol.tla  (NON-VACUITY PROBES)
\*
\* Each probe is an invariant we EXPECT TLC to REFUTE: a refutation proves the
\* named behaviour is reachable in the bounded state space, so the safety pass
\* is meaningful (non-vacuous), not trivially satisfied. Enable ONE probe at a
\* time (TLC stops at the first violated invariant and prints the trace).
\*
\* Same bound as the safety config. No SYMMETRY: we want the literal trace.
\*
\* Usage (see check.sh, which runs each probe in turn):
\*   tlc -config commit_protocol_probes.cfg commit_protocol.tla   \* runs the
\*   single INVARIANT left uncommented below.

CONSTANTS
    Writers = { w1, w2 }
    Readers = { r1, r2 }
    MaxVersion = 2
    MaxLeaseEpoch = 3
    None = NoneVal

INIT Init
NEXT Next

\* --- Enable exactly ONE of the following at a time ---
\* PROBE-A: the same-version commit race is reachable (carried from v1).
\* INVARIANT NoRaceProbe
\*
\* PROBE-B: two writers race the SAME version with DISTINCT staged ids
\*          (the DA-1 non-vacuity probe -- the v1 idempotent collapse is gone).
INVARIANT DistinctIdsProbe
\*
\* PROBE-C: a fenced/zombie writer durably writes its orphan AFTER the winner
\*          committed the same version (proves ZombieLateWrite fires in-space).
\* INVARIANT ZombieWroteProbe
