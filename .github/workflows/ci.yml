name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Primary signal: the standard rustup/cargo path most contributors use.
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features --verbose

      # openCypher TCK (Cat. 4): run the vendored corpus through the harness and
      # surface the live pass-rate. The corpus is vendored under
      # tck/openCypher/features, so this needs no external network access.
      - name: openCypher TCK pass-rate
        run: |
          mkdir -p .project/reports
          cargo run --quiet -p tck-runner -- \
            --format json --output .project/reports/tck-latest.json
          echo '### openCypher TCK pass-rate' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .project/reports/tck-latest.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload TCK report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tck-latest
          path: .project/reports/tck-latest.json

  # Hygiene gate: secrets must never reach the repo. gitleaks scans full history
  # using the committed .gitleaks.toml, so a pushed secret fails the build (not
  # just the local pre-commit hook). See docs/process/open-source-guardrails.md.
  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  # Hygiene gate: every dependency must be license-clean (permissive-only
  # allow-list). Layer 2 of the license check — layer 1 is the in-repo manifest
  # test (tests/license_manifest.rs) that runs in the `test` job above.
  license-check:
    name: cargo-deny (license check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-deny (engine workspace — licenses + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources
      # The python/ PyO3 bindings crate is its own isolated workspace (own
      # Cargo.lock) so the root invocation above does not see its dependency
      # tree. Point cargo-deny at it explicitly with its own deny.toml.
      - name: Run cargo-deny (python bindings workspace — licenses + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: python/Cargo.toml
          command: check licenses sources

  # Latency simulation: the formal/latency-sim sub-workspace is its own [workspace]
  # and is invisible to root `cargo` commands, so we gate it explicitly here.
  # This keeps the Cat. 3 + Cat. 11 GATE proof live — it cannot silently rot.
  latency-sim:
    name: latency-sim (fmt + clippy + test + SLA assert)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: formal/latency-sim
      - name: Format check
        run: cargo fmt --manifest-path formal/latency-sim/Cargo.toml --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path formal/latency-sim/Cargo.toml --all-targets -- -D warnings
      - name: Test
        run: cargo test --manifest-path formal/latency-sim/Cargo.toml --all-features
      - name: SLA assertion (exits non-zero if any envelope SLA is violated)
        run: cargo run --manifest-path formal/latency-sim/Cargo.toml --release -- --trials 20000 --seed 1

  # Coverage + grader inputs: cargo-llvm-cov produces a line-coverage number,
  # the GRADER_INPUTS block is emitted to the log for the rubric-grader's
  # scraper, and the coverage gate fails the build below the threshold.
  coverage:
    name: coverage + grader inputs
    runs-on: ubuntu-latest
    env:
      # Coverage gate. Starts at 0 so the early/empty crate is not blocked;
      # ratcheted toward 90 as real tests land. See docs/process/ci-grader-inputs.md.
      COVERAGE_THRESHOLD: "0"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (with llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage (LCOV + JSON)
        run: |
          mkdir -p coverage
          # One instrumented build, two report shapes: LCOV (artifact /
          # Codecov-ready) and JSON (machine-readable line% for GRADER_INPUTS).
          cargo llvm-cov --all-features --workspace --lcov \
            --output-path coverage/lcov.info
          cargo llvm-cov --all-features --workspace --json \
            --output-path coverage/coverage.json
      - name: Compute coverage % and test counts
        id: metrics
        run: |
          COVERAGE_PCT=$(jq -r '.data[0].totals.lines.percent' coverage/coverage.json)
          echo "coverage_pct=${COVERAGE_PCT}" >> "$GITHUB_OUTPUT"
          # Test pass/total tally from libtest's own summary lines.
          TEST_OUT=$(cargo test --all-features 2>&1 || true)
          PASS=$(printf '%s' "$TEST_OUT" | grep -oE '[0-9]+ passed' | grep -oE '[0-9]+' | awk '{s+=$1} END {print s+0}')
          FAILED=$(printf '%s' "$TEST_OUT" | grep -oE '[0-9]+ failed' | grep -oE '[0-9]+' | awk '{s+=$1} END {print s+0}')
          TOTAL=$((PASS + FAILED))
          echo "test_pass=${PASS}" >> "$GITHUB_OUTPUT"
          echo "test_total=${TOTAL}" >> "$GITHUB_OUTPUT"
      - name: Refresh TCK results JSON (canonical path)
        # Regenerate the canonical TCK summary so GRADER_INPUTS' tck_pass_rate and
        # the archived artifact carry real counts. This job runs on its own runner
        # (independent of the `test` job that also emits this file), so it produces
        # its own copy at the one canonical path the rubric grader reads
        # (.project/reports/tck-latest.json — master-rubric Cat. 4, line 76).
        # Best-effort: grader-inputs.sh degrades to 0/0 if the file is absent.
        run: |
          mkdir -p .project/reports
          cargo run --quiet -p tck-runner -- \
            --format json --output .project/reports/tck-latest.json || true
      - name: Emit GRADER_INPUTS + enforce coverage gate
        run: |
          bash scripts/ci/grader-inputs.sh \
            --coverage "${{ steps.metrics.outputs.coverage_pct }}" \
            --threshold "${COVERAGE_THRESHOLD}" \
            --test-pass "${{ steps.metrics.outputs.test_pass }}" \
            --test-total "${{ steps.metrics.outputs.test_total }}" \
            --tck-json .project/reports/tck-latest.json \
            | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - name: Upload TCK results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tck-results
          path: .project/reports/tck-latest.json
          retention-days: 14
          if-no-files-found: ignore

  # Python bindings (Cat. 8): the python/ PyO3 crate is its own isolated
  # workspace (own Cargo.lock) so it is invisible to the root cargo commands in
  # the `test` job. Build it with maturin, run the pytest smoke suite against the
  # importable module, build a wheel, lint the Python with ruff, and run the
  # crate's Rust unit tests. T-0030 wires this; the real query/ingest API (T-0031)
  # extends the suite.
  python-bindings:
    name: python (maturin build + pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin + test tooling
        run: python -m pip install --upgrade pip "maturin>=1.7,<2.0" "pytest>=7" "ruff>=0.5"

      # Lint + format-check the Python test code (Cat. 8 acceptance criterion).
      - name: Ruff lint
        run: ruff check --config python/ruff.toml python/
      - name: Ruff format check
        run: ruff format --config python/ruff.toml --check python/

      # Rust-side unit tests for the bindings crate (panic-mapping etc.). Runs
      # WITHOUT the extension-module feature so the test binary links libpython.
      - name: Cargo fmt check (python crate)
        run: cargo fmt --manifest-path python/Cargo.toml --all --check
      - name: Clippy (python crate, deny warnings)
        run: cargo clippy --manifest-path python/Cargo.toml --all-targets -- -D warnings
      - name: Cargo test (python crate)
        run: cargo test --manifest-path python/Cargo.toml

      # Build the extension into the environment and run the pytest smoke suite.
      - name: maturin develop (importable module)
        run: maturin develop -m python/Cargo.toml
      - name: pytest smoke suite
        run: pytest python/tests -v

      # Acceptance criterion: `maturin build` produces a wheel.
      - name: maturin build (wheel)
        run: maturin build -m python/Cargo.toml --release
      - name: Upload wheel artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caerostris-wheel
          path: python/target/wheels/*.whl
          if-no-files-found: error

  # Secondary signal: prove the Nix dev shell still builds (catches flake rot).
  nix:
    name: nix dev shell builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=
      - name: Build dev shell and report toolchain
        run: nix develop --impure --command bash -c "rustc --version && cargo --version"
