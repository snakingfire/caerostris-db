name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Primary signal: the standard rustup/cargo path most contributors use.
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features --verbose

      # openCypher TCK (Cat. 4): run the vendored corpus through the harness and
      # surface the live pass-rate. The corpus is vendored under
      # tck/openCypher/features, so this needs no external network access.
      - name: openCypher TCK pass-rate
        run: |
          mkdir -p .project/reports
          cargo run --quiet -p tck-runner -- \
            --format json --output .project/reports/tck-latest.json
          echo '### openCypher TCK pass-rate' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat .project/reports/tck-latest.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload TCK report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tck-latest
          path: .project/reports/tck-latest.json

  # Hygiene gate: secrets must never reach the repo. gitleaks scans full history
  # using the committed .gitleaks.toml, so a pushed secret fails the build (not
  # just the local pre-commit hook). See docs/process/open-source-guardrails.md.
  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  # Hygiene gate: every dependency must be license-clean (permissive-only
  # allow-list). Layer 2 of the license check — layer 1 is the in-repo manifest
  # test (tests/license_manifest.rs) that runs in the `test` job above.
  license-check:
    name: cargo-deny (license check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-deny (licenses + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources

  # Latency simulation: the formal/latency-sim sub-workspace is its own [workspace]
  # and is invisible to root `cargo` commands, so we gate it explicitly here.
  # This keeps the Cat. 3 + Cat. 11 GATE proof live — it cannot silently rot.
  latency-sim:
    name: latency-sim (fmt + clippy + test + SLA assert)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: formal/latency-sim
      - name: Format check
        run: cargo fmt --manifest-path formal/latency-sim/Cargo.toml --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path formal/latency-sim/Cargo.toml --all-targets -- -D warnings
      - name: Test
        run: cargo test --manifest-path formal/latency-sim/Cargo.toml --all-features
      - name: SLA assertion (exits non-zero if any envelope SLA is violated)
        run: cargo run --manifest-path formal/latency-sim/Cargo.toml --release -- --trials 20000 --seed 1

  # Secondary signal: prove the Nix dev shell still builds (catches flake rot).
  nix:
    name: nix dev shell builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-substituters = https://devenv.cachix.org
            extra-trusted-public-keys = devenv.cachix.org-1:w1cLUi8dv3hnoSPGAuibQv+f9TZLr6cv/Hm9XgU50cw=
      - name: Build dev shell and report toolchain
        run: nix develop --impure --command bash -c "rustc --version && cargo --version"
